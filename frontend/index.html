<!DOCTYPE html>
<html>

<head>
<title>Forex Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    margin:40px;
}

input, select, button{
    padding:8px;
    margin:5px;
}

button{
    cursor:pointer;
}

.results{
    margin-top:20px;
}

canvas{
    margin-top:20px;
}

</style>

</head>

<body>

<h1>Forex Analytics Dashboard</h1>

<div>

<label>Base currency:</label>
<select id="base"></select>

<label>Target currency:</label>
<select id="target"></select>

<label>Amount:</label>
<input id="amount" type="number" value="100">

<button onclick="convert()">Convert</button>

</div>

<div class="results">

<h2>Results</h2>

<p id="conversion"></p>
<p id="volatility"></p>
<p id="trend"></p>
<p id="regime"></p>

</div>

<h2>Exchange Rate History (Latest 30 Observations)</h2>

<canvas id="priceChart" width="600" height="300"></canvas>

<script>

const API = "http://127.0.0.1:8000"


async function fetchJson(endpoint){

    const response = await fetch(`${API}${endpoint}`)
    let data = null

    try{
        data = await response.json()
    }
    catch(_error){
        data = null
    }

    if(!response.ok){
        const message = data?.detail || data?.error || `Request failed (${response.status})`
        throw new Error(message)
    }

    return data
}


async function loadCurrencies(){

    try{
        let data = await fetchJson("/currencies")

        let baseSelect = document.getElementById("base")
        let targetSelect = document.getElementById("target")

        data.currencies.forEach(currency => {

            let option1 = document.createElement("option")
            option1.value = currency
            option1.text = currency
            baseSelect.appendChild(option1)

            let option2 = document.createElement("option")
            option2.value = currency
            option2.text = currency
            targetSelect.appendChild(option2)

        })
    }
    catch(err){
        document.getElementById("conversion").innerText = `Error loading currencies: ${err.message}`
    }

}


function trendArrow(trend){

    if(trend === "uptrend") return "↑ Uptrend"
    if(trend === "downtrend") return "↓ Downtrend"
    return "→ Stable"

}


function clearChart(){

    if(window.chart){
        window.chart.destroy()
        window.chart = null
    }

}


async function convert(){

    let base = document.getElementById("base").value
    let target = document.getElementById("target").value
    let amount = document.getElementById("amount").value

    document.getElementById("conversion").innerText = "Loading..."
    document.getElementById("volatility").innerText = ""
    document.getElementById("trend").innerText = ""
    document.getElementById("regime").innerText = ""

    try{

        let convData = await fetchJson(`/convert?base=${base}&target=${target}&amount=${amount}`)

        document.getElementById("conversion").innerText =
            "Converted amount: " + convData.converted

        if(base === target){
            document.getElementById("volatility").innerText =
                "Volatility: N/A (same currency pair)"
            document.getElementById("trend").innerText =
                "Trend: N/A (same currency pair)"
            document.getElementById("regime").innerText =
                "Market regime: N/A (same currency pair; rate is always 1)"
            clearChart()
            return
        }


        let volData = await fetchJson(`/volatility?base=${base}&target=${target}`)

        document.getElementById("volatility").innerText =
            "Volatility: " + volData.volatility


        let trendData = await fetchJson(`/trend?base=${base}&target=${target}`)

        document.getElementById("trend").innerText =
            "Trend: " + trendArrow(trendData.trend)


        let regimeData = await fetchJson(`/regime?base=${base}&target=${target}`)

        document.getElementById("regime").innerText =
            "Market regime: " + regimeData.regime


        await loadHistory(base, target)

    }
    catch(err){

        document.getElementById("conversion").innerText =
            "Error: " + err.message
        clearChart()

    }

}


async function loadHistory(base, target){

    try{
        let data = await fetchJson(`/history?base=${base}&target=${target}&days=30`)

        let dates = data.rates.map(r => r.date)
        let prices = data.rates.map(r => r.rate)

        const ctx = document.getElementById('priceChart').getContext('2d')

        if(window.chart){
            window.chart.destroy()
        }

        window.chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: dates.reverse(),
                datasets: [{
                    label: `${base}/${target}`,
                    data: prices.reverse(),
                    borderColor: 'blue',
                    borderWidth: 2,
                    fill: false
                }]
            },
            options: {
                responsive: true
            }
        })
    }
    catch(err){
        document.getElementById("regime").innerText = "History unavailable: " + err.message
        clearChart()
    }

}


loadCurrencies()

</script>

</body>

</html>
